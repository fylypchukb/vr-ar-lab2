<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 3 — AR Hit Test</title>
  </head>
  <body>
    <a id="back-btn" href="/">← Home</a>

    <div id="settings-panel">
      <div class="sp-heading">Task 3 — Settings</div>
      <div class="sp-title">Configure Cone</div>

      <div class="sp-row">
        <span class="sp-label">Color</span>
        <div style="display:flex;align-items:center;gap:10px">
          <div id="colorSwatch" style="position:relative;width:28px;height:28px;border-radius:6px;background:#00ccff;border:2px solid rgba(255,255,255,0.3);cursor:pointer;flex-shrink:0;">
            <input id="colorPicker" type="color" value="#00ccff"
              style="opacity:0;position:absolute;inset:0;width:100%;height:100%;cursor:pointer;border:none;">
          </div>
          <button id="randomColorBtn" class="sp-btn">Random</button>
        </div>
      </div>

      <div class="sp-row">
        <span class="sp-label">Size</span>
        <div style="display:flex;align-items:center;gap:10px">
          <input id="sizeSlider" type="range" min="0.3" max="3.0" step="0.05" value="1"
            style="width:120px;accent-color:#64dcb4;">
          <span id="scaleIndicator" style="font-size:12px;color:#64dcb4;min-width:40px">1.00×</span>
        </div>
      </div>

      <div class="sp-row">
        <span class="sp-label">Rotation</span>
        <button id="toggleRotationBtn" class="sp-toggle on">Enabled</button>
      </div>

      <div class="sp-row">
        <span class="sp-label">Pulse animation</span>
        <button id="toggleScaleAnimationBtn" class="sp-toggle">Disabled</button>
      </div>

      <div class="sp-row">
        <span class="sp-label">Material</span>
        <div style="display:flex;gap:6px">
          <button class="mat-btn on" data-idx="0">Standard</button>
          <button class="mat-btn" data-idx="1">Emissive</button>
          <button class="mat-btn" data-idx="2">Transparent</button>
        </div>
      </div>

      <div class="sp-hint">
        Press <strong>START AR</strong> below &middot; tap surface to place
      </div>
    </div>

    <script type="module" src="/src/task-3.js"></script>
  </body>
</html>
