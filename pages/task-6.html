<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 6 — AR Physics Drop</title>
  </head>
  <body>
    <a id="back-btn" href="/">← Home</a>

    <div id="t6-panel">
      <div class="sp-heading">Task 6 — Physics Simulation</div>
      <div class="sp-title">Rapier Physics Drop</div>

      <div id="t6-load-status" class="t4-load-status">Loading model…</div>

      <div class="t4-section" style="max-width:340px">
        <div class="t4-section-label">Bounce (Restitution)</div>
        <div class="c2-field-label">
          Coefficient <span id="t6-restitution-label">0.55</span>
        </div>
        <input type="range" class="c2-slider" id="t6-restitution"
               min="0" max="0.95" step="0.05" value="0.55" />
      </div>

      <div class="t4-section" style="max-width:340px">
        <div class="t4-section-label">Gravity</div>
        <div class="c2-field-label">
          Strength <span id="t6-gravity-label">9.8 m/s²</span>
        </div>
        <input type="range" class="c2-slider" id="t6-gravity"
               min="1" max="20" step="0.2" value="9.8" />
      </div>

      <div class="t4-section" style="max-width:340px">
        <div class="t4-section-label">Drop Height</div>
        <div class="c2-field-label">
          Above surface <span id="t6-spawn-label">0.6 m</span>
        </div>
        <input type="range" class="c2-slider" id="t6-spawn"
               min="0.2" max="2.0" step="0.1" value="0.6" />
      </div>

      <div class="sp-hint">
        Aim reticle at a surface · press <strong>START AR</strong> · tap to drop
      </div>
    </div>

    <!-- In-AR HUD -->
    <div id="t6-hud">
      <div id="t6-status">Tap a surface to drop</div>
      <button id="t6-reset-btn" class="sp-btn">Reset</button>
    </div>

    <script type="module" src="/src/task-6.js"></script>
  </body>
</html>
